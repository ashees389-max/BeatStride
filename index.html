<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
    <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#030810">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>BeatStride</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    html, body {
      width:100%; height:100%;
      overflow:hidden;
      background:#030710;
      font-family: Georgia, 'Times New Roman', serif;
    }

    .stage {
      width:100%; height:100vh;
      position:relative;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      overflow:hidden;
    }

    /* Deep space navy depth */
    .stage::before {
      content:"";
      position:absolute; inset:0;
      background:
        radial-gradient(ellipse 90% 55% at 50% 0%,   rgba(12,22,80,0.60) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 15% 85%,  rgba(8,14,52,0.50)  0%, transparent 65%),
        radial-gradient(ellipse 55% 38% at 85% 55%,  rgba(9,18,60,0.38)  0%, transparent 60%),
        radial-gradient(ellipse 100% 80% at 50% 50%, rgba(4,8,30,0.85)   0%, transparent 100%);
      pointer-events:none;
    }

    #canvas {
      position:absolute; inset:0;
      pointer-events:none;
    }

    /* Center content */
    .center {
      position:relative;
      z-index:10;
      display:flex;
      flex-direction:column;
      align-items:center;
      text-align:center;
      padding:0 32px;
      animation: appear 1.4s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes appear {
      from { opacity:0; transform:translateY(18px); }
      to   { opacity:1; transform:translateY(0); }
    }

    h1 {
      color:#ffffff;
      font-size: clamp(3.2rem, 12vw, 5.8rem);
      font-weight:700;
      letter-spacing:-1.5px;
      line-height:1;
      text-shadow: 0 1px 2px rgba(0,0,0,0.7);
      animation: nameReveal 1.7s cubic-bezier(0.16,1,0.3,1) 0.1s both;
    }

    @keyframes nameReveal {
      from { opacity:0; letter-spacing:10px; }
      to   { opacity:1; letter-spacing:-1.5px; }
    }

    .rule {
      width:36px; height:1px;
      background:rgba(255,255,255,0.22);
      margin:22px auto;
      animation: ruleGrow 1s 0.7s ease both;
    }

    @keyframes ruleGrow {
      from { width:0; opacity:0; }
      to   { width:36px; opacity:1; }
    }

    .tagline {
      color:rgba(255,255,255,0.35);
      font-family:'Segoe UI','Helvetica Neue',system-ui,sans-serif;
      font-size:clamp(0.6rem,2.5vw,0.7rem);
      font-weight:400;
      letter-spacing:5px;
      text-transform:uppercase;
      animation: fadeIn 1s 1s ease both;
    }

    @keyframes fadeIn {
      from { opacity:0; }
      to   { opacity:1; }
    }

    /* Progress line */
    .progress-track {
      position:absolute;
      bottom:44px;
      left:50%; transform:translateX(-50%);
      width:48px; height:1px;
      background:rgba(255,255,255,0.1);
      border-radius:1px;
      overflow:hidden;
      animation: fadeIn 0.6s 0.9s ease both;
    }

    .progress-fill {
      height:100%; width:0%;
      background:rgba(255,255,255,0.4);
      animation: fill 1.8s linear 0.5s forwards;
    }

    @keyframes fill {
      from { width:0%; }
      to   { width:100%; }
    }

    .stage.out { animation: fadeOut 0.42s ease forwards; }

    @keyframes fadeOut { to { opacity:0; } }
  </style>
</head>
<body>
<script src="storage.js"></script>

<div class="stage" id="stage">
  <canvas id="canvas"></canvas>

  <div class="center">
    <h1>BeatStride</h1>
    <div class="rule"></div>
    <p class="tagline">Rhythm &nbsp;·&nbsp; Focus &nbsp;·&nbsp; Evolve</p>
  </div>

  <div class="progress-track">
    <div class="progress-fill"></div>
  </div>
</div>

<script>
(function () {
  const canvas = document.getElementById("canvas");
  const ctx    = canvas.getContext("2d");
  let W, H;

  /* ── Star definitions ── */
  let small  = [];   // dense background field
  let bright = [];   // 10 prominent foreground stars
  let shoots = [];   // shooting stars

  /* ── Resize ── */
  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
    buildSmall();
    buildBright();
  }

  /* ── Small background stars ── */
  function buildSmall() {
    const n = Math.floor((W * H) / 3000);
    small = Array.from({ length: n }, () => ({
      x  : Math.random() * W,
      y  : Math.random() * H,
      r  : Math.random() * 0.75 + 0.15,
      a  : Math.random() * 0.5 + 0.08,
      da : (Math.random() * 0.003 + 0.0008) * (Math.random() < 0.5 ? 1 : -1),
      dx : Math.random() * 0.025 - 0.0125,
    }));
  }

  /* ── Bright prominent stars (B) ── */
  function buildBright() {
    bright = Array.from({ length: 11 }, () => {
      const r = Math.random() * 1.1 + 1.2;  // 1.2 – 2.3 px radius
      return {
        x   : Math.random() * W,
        y   : Math.random() * H,
        r,
        a   : Math.random() * 0.35 + 0.55,  // 0.55–0.90 alpha
        da  : (Math.random() * 0.006 + 0.002) * (Math.random() < 0.5 ? 1 : -1),
        glow: r * 6,                          // halo radius
      };
    });
  }

  /* ── Shooting star factory (C) ── */
  function spawnShoot() {
    // Random start along top edge or left edge
    const fromTop = Math.random() < 0.65;
    const sx = fromTop ? Math.random() * W * 0.7 + W * 0.1 : 0;
    const sy = fromTop ? 0 : Math.random() * H * 0.4;
    const angle   = (Math.PI / 180) * (Math.random() * 20 + 28); // 28–48°
    const speed   = Math.random() * 4 + 5;      // px per frame
    const length  = Math.random() * 90 + 80;    // tail length
    const life    = Math.random() * 40 + 50;    // frames total

    shoots.push({ sx, sy, x:sx, y:sy, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, length, life, age:0 });
  }

  /* Schedule next shooting star — random gap 3.5–7 seconds */
  function scheduleShoot() {
    const delay = Math.random() * 3500 + 3500;
    setTimeout(() => { spawnShoot(); scheduleShoot(); }, delay);
  }

  /* ── Draw one frame ── */
  function draw() {
    ctx.clearRect(0, 0, W, H);

    /* Small stars */
    for (const s of small) {
      s.a += s.da;
      if (s.a > 0.58 || s.a < 0.06) s.da *= -1;
      s.x += s.dx;
      if (s.x < 0) s.x = W;
      if (s.x > W) s.x = 0;

      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${s.a.toFixed(3)})`;
      ctx.fill();
    }

    /* Bright stars with soft halo */
    for (const s of bright) {
      s.a += s.da;
      if (s.a > 0.92 || s.a < 0.45) s.da *= -1;

      /* halo — very soft radial, no hard colour */
      const g = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.glow);
      g.addColorStop(0,   `rgba(220,232,255,${(s.a * 0.28).toFixed(3)})`);
      g.addColorStop(0.4, `rgba(210,225,255,${(s.a * 0.10).toFixed(3)})`);
      g.addColorStop(1,   `rgba(200,220,255,0)`);
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.glow, 0, Math.PI * 2);
      ctx.fillStyle = g;
      ctx.fill();

      /* core dot */
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(240,246,255,${s.a.toFixed(3)})`;
      ctx.fill();
    }

    /* Shooting stars */
    shoots = shoots.filter(s => s.age < s.life);
    for (const s of shoots) {
      s.age++;
      s.x += s.vx;
      s.y += s.vy;

      const progress = s.age / s.life;
      /* fade in first 15%, full for 50%, fade out last 35% */
      const alpha =
        progress < 0.15 ? progress / 0.15 :
        progress < 0.65 ? 1 :
        1 - (progress - 0.65) / 0.35;

      const tailX = s.x - s.vx / (s.vx**2 + s.vy**2)**0.5 * s.length * Math.min(progress * 4, 1);
      const tailY = s.y - s.vy / (s.vx**2 + s.vy**2)**0.5 * s.length * Math.min(progress * 4, 1);

      const grad = ctx.createLinearGradient(tailX, tailY, s.x, s.y);
      grad.addColorStop(0, `rgba(255,255,255,0)`);
      grad.addColorStop(1, `rgba(255,255,255,${(alpha * 0.82).toFixed(3)})`);

      ctx.beginPath();
      ctx.moveTo(tailX, tailY);
      ctx.lineTo(s.x,   s.y);
      ctx.strokeStyle = grad;
      ctx.lineWidth   = 1.2;
      ctx.lineCap     = "round";
      ctx.stroke();

      /* tiny bright head */
      ctx.beginPath();
      ctx.arc(s.x, s.y, 1.1, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${(alpha * 0.9).toFixed(3)})`;
      ctx.fill();
    }

    requestAnimationFrame(draw);
  }

  window.addEventListener("resize", resize);
  resize();
  draw();

  /* First shooting star after 0.8s — well before the 1800ms auto-navigate
     (WAIT below) so it actually has visible runway before the page fades
     out, instead of spawning after the transition has already begun. */
  setTimeout(() => { spawnShoot(); scheduleShoot(); }, 800);

})();

/* ── Navigation ──
   If the user has picked a Default Mode in Settings ("Athletic" or
   "Music"), skip the mode-select screen and go straight there.
   Falls back to metronomeItem.html (mode select) when no default is
   set — i.e. "Ask every time" — same as before this fix existed. */
const MODE_DEST = { athletic: "athleticMetronome.html", music: "musicMetronome.html" };
let DEST = "metronomeItem.html";
if (typeof MetStorage !== "undefined") {
  const defaultMode = MetStorage.getDefaultMode();
  if (defaultMode && MODE_DEST[defaultMode]) DEST = MODE_DEST[defaultMode];
}
const WAIT = 1800;
const FADE = 420;

function go() {
  document.getElementById("stage").classList.add("out");
  setTimeout(() => { location.href = DEST; }, FADE);
}

const t = setTimeout(go, WAIT);
document.addEventListener("pointerdown", () => { clearTimeout(t); go(); }, { once: true });
document.addEventListener("keydown",     () => { clearTimeout(t); go(); }, { once: true });
</script>
</body>
</html>
