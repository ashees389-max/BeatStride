<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>

    <!-- Background circle gradient — deep navy centre, darker edge -->
    <radialGradient id="bgCircle" cx="42%" cy="38%" r="65%">
      <stop offset="0%"   stop-color="#0f1a45"/>
      <stop offset="60%"  stop-color="#070e2e"/>
      <stop offset="100%" stop-color="#030810"/>
    </radialGradient>

    <!-- Very subtle glow behind metronome — barely there -->
    <radialGradient id="shimmer" cx="50%" cy="48%" r="42%">
      <stop offset="0%"   stop-color="#c8d8ff" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#c8d8ff" stop-opacity="0"/>
    </radialGradient>

    <!-- Clip everything to the circle -->
    <clipPath id="circleClip">
      <circle cx="256" cy="256" r="236"/>
    </clipPath>

    <!-- Outer ring gradient — top-left bright, bottom-right dim -->
    <linearGradient id="ringGrad" x1="25%" y1="15%" x2="75%" y2="85%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="50%"  stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.03"/>
    </linearGradient>

  </defs>

  <!-- ── Background circle ── -->
  <circle cx="256" cy="256" r="256" fill="#030810"/>
  <circle cx="256" cy="256" r="236" fill="url(#bgCircle)"/>

  <!-- Very faint shimmer behind metronome -->
  <circle cx="256" cy="256" r="236" fill="url(#shimmer)"/>

  <!-- ── Faint star field inside circle ── -->
  <g clip-path="url(#circleClip)" opacity="0.6">
    <circle cx="88"  cy="112" r="1.1" fill="rgba(255,255,255,0.55)"/>
    <circle cx="420" cy="96"  r="0.9" fill="rgba(255,255,255,0.40)"/>
    <circle cx="72"  cy="310" r="0.8" fill="rgba(255,255,255,0.35)"/>
    <circle cx="430" cy="340" r="1.0" fill="rgba(255,255,255,0.45)"/>
    <circle cx="140" cy="420" r="0.7" fill="rgba(255,255,255,0.30)"/>
    <circle cx="390" cy="430" r="0.8" fill="rgba(255,255,255,0.38)"/>
    <circle cx="460" cy="200" r="0.9" fill="rgba(255,255,255,0.42)"/>
    <circle cx="58"  cy="190" r="0.7" fill="rgba(255,255,255,0.32)"/>
  </g>

  <!-- ══════════════════════════════════════════
       METRONOME — clean white flat silhouette
       All shapes pure white, no gradients
  ═══════════════════════════════════════════ -->

  <!-- ── Ghost trail — faint mirror rod suggesting motion ── -->
  <line
    x1="264" y1="53"
    x2="205" y2="388"
    stroke="rgba(255,255,255,0.10)"
    stroke-width="3.5"
    stroke-linecap="round"
  />

  <!-- ── Main body triangle ──
       Base: 196px wide centred at 256
       Apex: at y=88, base at y=406
       Classic 1:1.63 proportion            ── -->
  <polygon
    points="256,88  158,406  354,406"
    fill="rgba(255,255,255,0.96)"
    clip-path="url(#circleClip)"
  />

  <!-- ── Notch cut into apex — dark trapezoid with inner depth ── -->
  <polygon
    points="244,110  268,110  272,148  240,148"
    fill="#030810"
    opacity="0.88"
  />
  <!-- Notch inner window — very subtle lighter centre suggesting depth -->
  <polygon
    points="248,118  264,118  267,142  245,142"
    fill="rgba(255,255,255,0.06)"
  />
  <!-- Notch rim highlight — top edge catches light -->
  <line x1="244" y1="110" x2="268" y2="110"
    stroke="rgba(255,255,255,0.25)" stroke-width="1" stroke-linecap="round"/>

  <!-- ── BPM scale ticks ── -->
  <g stroke="#030810" stroke-opacity="0.55" stroke-width="2" stroke-linecap="round">
    <!-- Left ticks -->
    <line x1="200" y1="172" x2="213" y2="172"/>
    <line x1="192" y1="222" x2="206" y2="222"/>
    <line x1="183" y1="272" x2="199" y2="272"/>
    <line x1="174" y1="322" x2="192" y2="322"/>
    <line x1="165" y1="372" x2="185" y2="372"/>
    <!-- Right ticks -->
    <line x1="312" y1="172" x2="299" y2="172"/>
    <line x1="320" y1="222" x2="306" y2="222"/>
    <line x1="329" y1="272" x2="313" y2="272"/>
    <line x1="338" y1="322" x2="320" y2="322"/>
    <line x1="347" y1="372" x2="327" y2="372"/>
  </g>

  <!-- ── Base platform ── -->
  <rect x="140" y="406" width="232" height="22" rx="5"
    fill="rgba(255,255,255,0.92)"/>

  <!-- ── Pendulum rod — main ── -->
  <line
    x1="244" y1="53"
    x2="303" y2="388"
    stroke="#030810"
    stroke-width="7"
    stroke-linecap="round"
    opacity="0.25"
  />
  <line
    x1="244" y1="53"
    x2="303" y2="388"
    stroke="rgba(255,255,255,0.98)"
    stroke-width="5"
    stroke-linecap="round"
  />

  <!-- ── Pivot dot — mechanical anchor at top of rod ── -->
  <!-- Outer ring -->
  <circle cx="252" cy="112" r="9"
    fill="#030810"
    opacity="0.75"
  />
  <!-- Inner bright dot -->
  <circle cx="252" cy="112" r="5.5"
    fill="rgba(255,255,255,0.90)"
  />
  <!-- Tiny centre hole — depth detail -->
  <circle cx="252" cy="112" r="2.2"
    fill="#030810"
    opacity="0.65"
  />

  <!-- ── Weight marker ── -->
  <g transform="translate(275,233) rotate(10)">
    <rect x="-16" y="-10" width="32" height="20" rx="4"
      fill="#030810" opacity="0.82"/>
    <rect x="-16" y="-10" width="32" height="4" rx="4"
      fill="rgba(255,255,255,0.18)"/>
    <rect x="-16" y="-10" width="32" height="20" rx="4"
      fill="none"
      stroke="rgba(255,255,255,0.22)"
      stroke-width="1"/>
  </g>

  <!-- ── Outer ring — premium glass edge ──
       Top-left catches light, fades to nothing   ── -->
  <circle cx="256" cy="256" r="236"
    fill="none"
    stroke="url(#ringGrad)"
    stroke-width="1.5"/>

  <!-- Inner ring — very subtle inset -->
  <circle cx="256" cy="256" r="233"
    fill="none"
    stroke="rgba(255,255,255,0.04)"
    stroke-width="1"/>

</svg>
