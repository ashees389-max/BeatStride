<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
    <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#030810">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>BeatStride — Select Mode</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    html, body {
      width:100%; height:100%;
      overflow:hidden;
      background:#030810;
      font-family: Georgia, 'Times New Roman', serif;
    }

    /* ── Stage ── */
    .stage {
      width:100%; height:100svh;
      position:relative;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }

    /* ── Content group — keeps label + card + nav visually unified ── */
    .content-group {
      position:relative; z-index:10;
      display:flex;
      flex-direction:column;
      align-items:center;
      width:100%;          /* ensures orbit-viewport gets full viewport width */
      /* Slight upward nudge so label feels like a heading above the card */
      margin-bottom: clamp(8px, 2svh, 20px);
    }

    /* ── Deep space background ── */
    .stage::before {
      content:"";
      position:absolute; inset:0;
      background:
        radial-gradient(ellipse 80% 50% at 50% 0%,    rgba(10,18,70,0.7)  0%, transparent 65%),
        radial-gradient(ellipse 60% 40% at 10% 80%,   rgba(6,12,48,0.5)   0%, transparent 60%),
        radial-gradient(ellipse 50% 35% at 88% 55%,   rgba(8,16,58,0.4)   0%, transparent 58%),
        radial-gradient(ellipse 100% 90% at 50% 50%,  rgba(3,6,24,0.85)   0%, transparent 100%);
      pointer-events:none; z-index:0;
    }

    /* ── Star canvas ── */
    #canvas { position:absolute; inset:0; pointer-events:none; z-index:1; }

    /* ── Orbital ring — subtle ellipse behind the planets ── */
    .orbit-ring {
      position:absolute;
      width: min(88vw, 520px);
      height: min(88vw, 520px);
      border-radius:50%;
      border: 1px solid rgba(255,255,255,0.045);
      box-shadow: 0 0 40px rgba(255,255,255,0.015);
      pointer-events:none; z-index:2;
      animation: orbitBreath 8s ease-in-out infinite;
    }
    @keyframes orbitBreath {
      0%,100%{ transform:scale(1);   opacity:0.6; }
      50%    { transform:scale(1.02); opacity:1;   }
    }

    /* ── App label ── */
    .app-label {
      position:relative; z-index:10;
      color: rgba(255,255,255,0.55);
      font-family:'Segoe UI','Helvetica Neue',system-ui,sans-serif;
      font-size:0.55rem;
      letter-spacing:6px;
      text-transform:uppercase;
      margin-bottom: clamp(8px,1.8svh,16px);
      animation: fadeUp 1s 0.1s ease both;
    }

    /* ── Orbit viewport — clips overflow ── */
    .orbit-viewport {
      position:relative; z-index:10;
      width:100vw;
      height: clamp(270px, 54svh, 390px);
      overflow:hidden;
      padding-top: 8px;
      /* Fade edges so inactive planet dissolves gracefully */
      -webkit-mask-image: linear-gradient(
        to right,
        transparent 0%,
        black 16%,
        black 84%,
        transparent 100%
      );
      mask-image: linear-gradient(
        to right,
        transparent 0%,
        black 16%,
        black 84%,
        transparent 100%
      );
    }

    /* ── Planet track — absolutely positioned, centred via CSS var ── */
    .planet-track {
      position:absolute;
      top:50%;
      /* 50vw = always true viewport centre, immune to parent flex shrinkage */
      left:50vw;
      transform: translateX(-50%) translateY(-50%);
      display:flex;
      align-items:center;
      gap: 24px;
      transition: transform 0.55s cubic-bezier(0.4,0,0.2,1);
      will-change: transform;
    }

    /* ── Individual planet card ── */
    .planet {
      position:relative;
      flex-shrink:0;
      width:  clamp(200px, 54vw, 320px);
      height: clamp(265px, 52svh, 380px);
      border-radius: clamp(24px,6vw,36px);
      text-decoration:none;
      display:flex;
      flex-direction:column;
      justify-content:flex-end;
      padding: clamp(20px,4vw,28px);
      overflow:hidden;
      /* Transition: all orbital properties */
      transition:
        transform    0.55s cubic-bezier(0.4,0,0.2,1),
        opacity      0.55s cubic-bezier(0.4,0,0.2,1),
        filter       0.55s cubic-bezier(0.4,0,0.2,1),
        box-shadow   0.55s cubic-bezier(0.4,0,0.2,1);
      cursor:pointer;
      user-select:none;
      -webkit-tap-highlight-color:transparent;
    }

    /* Active planet */
    .planet.is-active {
      transform: scale(1);
      opacity:1;
      filter:blur(0px);
      pointer-events:all;
    }

    /* Inactive planet — smaller, dimmer, blurred */
    .planet.is-inactive {
      transform: scale(0.60);
      opacity:0.28;
      filter: blur(2.5px);
      pointer-events:all; /* still tappable to switch */
    }

    /* ── Athletic planet — Mars warmth ── */
    .planet-athletic {
      background:
        radial-gradient(ellipse 90% 60% at 40% 20%,
          rgba(180,70,40,0.18) 0%, transparent 60%),
        linear-gradient(
          155deg,
          rgba(255,255,255,0.095) 0%,
          rgba(255,255,255,0.040) 50%,
          rgba(255,255,255,0.012) 100%
        );
      border: 1px solid rgba(255,255,255,0.09);
      box-shadow:
        inset 0 1.5px 0 rgba(255,255,255,0.16),
        inset 0 -1px  0 rgba(255,255,255,0.03),
        0 0 0 0.5px rgba(255,255,255,0.04),
        0 40px 80px rgba(0,0,0,0.6);
      backdrop-filter: blur(28px) saturate(1.3);
      -webkit-backdrop-filter: blur(28px) saturate(1.3);
    }
    /* Active glow for athletic */
    .planet-athletic.is-active {
      box-shadow:
        inset 0 1.5px 0 rgba(255,255,255,0.18),
        inset 0 -1px  0 rgba(255,255,255,0.03),
        0 0 0 0.5px rgba(210,90,60,0.15),
        0 40px 80px rgba(0,0,0,0.65),
        0 0 60px rgba(200,70,40,0.10),
        0 0 120px rgba(180,50,20,0.06);
    }

    /* ── Music planet — Neptune cool ── */
    .planet-music {
      background:
        radial-gradient(ellipse 90% 60% at 60% 20%,
          rgba(50,80,200,0.18) 0%, transparent 60%),
        linear-gradient(
          155deg,
          rgba(255,255,255,0.095) 0%,
          rgba(255,255,255,0.040) 50%,
          rgba(255,255,255,0.012) 100%
        );
      border: 1px solid rgba(255,255,255,0.09);
      box-shadow:
        inset 0 1.5px 0 rgba(255,255,255,0.16),
        inset 0 -1px  0 rgba(255,255,255,0.03),
        0 0 0 0.5px rgba(255,255,255,0.04),
        0 40px 80px rgba(0,0,0,0.6);
      backdrop-filter: blur(28px) saturate(1.3);
      -webkit-backdrop-filter: blur(28px) saturate(1.3);
    }
    /* Active glow for music */
    .planet-music.is-active {
      box-shadow:
        inset 0 1.5px 0 rgba(255,255,255,0.18),
        inset 0 -1px  0 rgba(255,255,255,0.03),
        0 0 0 0.5px rgba(70,100,220,0.15),
        0 40px 80px rgba(0,0,0,0.65),
        0 0 60px rgba(50,80,200,0.10),
        0 0 120px rgba(30,60,180,0.06);
      border-color: rgba(255,255,255,0.10);
    }

    /* ── Planet ambient SVG (top-right area) ── */
    .planet-bg {
      position:absolute;
      top:0; right:0;
      width:62%; height:65%;
      pointer-events:none;
      opacity:0.075;
    }

    /* ── Planet inner glow — mode-specific ── */
    .planet-glow {
      position:absolute;
      top:-30%; left:-20%;
      width:100%; height:80%;
      border-radius:50%;
      pointer-events:none;
      transition: opacity 0.55s ease;
    }
    .planet-athletic .planet-glow {
      background: radial-gradient(
        ellipse at 40% 50%,
        rgba(220,85,50,0.12) 0%,
        transparent 65%
      );
    }
    .planet-music .planet-glow {
      background: radial-gradient(
        ellipse at 60% 50%,
        rgba(60,100,220,0.12) 0%,
        transparent 65%
      );
    }

    /* ── Mode tag ── */
    .planet-tag {
      font-family:'Segoe UI','Helvetica Neue',system-ui,sans-serif;
      font-size:0.54rem;
      letter-spacing:4px;
      color:rgba(255,255,255,0.32);
      text-transform:uppercase;
      margin-bottom:8px;
      position:relative; z-index:2;
    }

    /* ── Mode name ── */
    .planet-name {
      color:#ffffff;
      font-size: clamp(2.2rem, 7vw, 3rem);
      font-weight:700;
      letter-spacing:-0.5px;
      line-height:1;
      position:relative; z-index:2;
      text-shadow:0 2px 8px rgba(0,0,0,0.45);
      margin-bottom:12px;
    }

    /* ── Feature list ── */
    .planet-features {
      display:flex;
      flex-direction:column;
      gap:5px;
      position:relative; z-index:2;
      margin-bottom:4px;
      /* Leave room for the arrow button in the bottom-right corner */
      padding-right: 44px;
    }
    .planet-feature {
      font-family:'Segoe UI','Helvetica Neue',system-ui,sans-serif;
      font-size:0.6rem;
      letter-spacing:1.5px;
      color:rgba(255,255,255,0.26);
      text-transform:uppercase;
      display:flex;
      align-items:flex-start;
      gap:7px;
      line-height:1.4;
      /* Allow wrapping on very narrow cards */
      white-space:normal;
      word-break:break-word;
    }
    .planet-feature::before {
      content:"";
      width:3px; height:3px;
      border-radius:50%;
      background:rgba(255,255,255,0.28);
      flex-shrink:0;
      margin-top:4px;
    }

    /* ── Enter CTA (only on active planet) ── */
    .planet-cta {
      position:absolute;
      bottom:18px; right:18px;
      z-index:2;
      width:30px; height:30px;
      border-radius:50%;
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.14);
      display:flex;align-items:center;justify-content:center;
      color:rgba(255,255,255,0.6);
      font-size:0.8rem;
      transition: opacity 0.3s;
    }
    .planet.is-inactive .planet-cta { opacity:0; }

    /* ── Navigation arrows ── */
    .nav-row {
      position:relative; z-index:10;
      display:flex;
      align-items:center;
      gap: clamp(28px,10vw,56px);
      margin-top: clamp(14px,3svh,28px);
      animation: fadeUp 0.7s 0.5s ease both;
    }
    .nav-btn {
      width:38px; height:38px;
      border-radius:50%;
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.10);
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;
      color:rgba(255,255,255,0.45);
      font-size:1rem;
      transition:background 0.2s, opacity 0.2s;
      -webkit-tap-highlight-color:transparent;
      user-select:none;
    }
    .nav-btn:active { background:rgba(255,255,255,0.14); }
    .nav-btn.hidden { opacity:0; pointer-events:none; }
    @media(hover:hover){
      .nav-btn:hover { background:rgba(255,255,255,0.12); color:rgba(255,255,255,0.8); }
    }

    /* Mode indicators — two dots ── */
    .nav-dots {
      display:flex; gap:8px; align-items:center;
    }
    .nav-dot {
      width:5px; height:5px;
      border-radius:50%;
      background:rgba(255,255,255,0.2);
      transition: background 0.35s, transform 0.35s;
    }
    .nav-dot.active {
      background:rgba(255,255,255,0.75);
      transform:scale(1.3);
    }

    /* ── Dashboard link ── */
    .dash-link {
      position:relative; z-index:10;
      margin-top: clamp(12px,2.5svh,22px);
      color:rgba(255,255,255,0.45);
      font-family:'Segoe UI','Helvetica Neue',system-ui,sans-serif;
      font-size:0.56rem;
      letter-spacing:3px;
      text-transform:uppercase;
      text-decoration:none;
      transition:color 0.2s;
      animation: fadeUp 0.7s 0.7s ease both;
    }
    @media(hover:hover){ .dash-link:hover { color:rgba(255,255,255,0.45); } }

    /* ── Shared animations ── */
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(12px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .stage.out { animation: stageOut 0.42s ease forwards; }
    @keyframes stageOut { to { opacity:0; } }

    /* ── Floating motion on active planet ── */
    .planet.is-active {
      animation: planetFloat 7s ease-in-out infinite;
    }
    @keyframes planetFloat {
      0%,100%{ transform:scale(1) translateY(0); }
      50%    { transform:scale(1) translateY(-6px); }
    }
    /* Inactive doesn't float — it just sits smaller */
    .planet.is-inactive { animation:none; }

    /* ── Entry animations ── */
    .planet-athletic {
      animation: entryA 0.9s 0.2s cubic-bezier(0.22,1,0.36,1) both;
    }
    .planet-music {
      animation: entryB 0.9s 0.35s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes entryA {
      from { opacity:0; transform:scale(0.88) translateY(30px); }
      to   { opacity:1; transform:scale(1)    translateY(0); }
    }
    @keyframes entryB {
      from { opacity:0; transform:scale(0.62) translateY(20px); }
      to   { opacity:0.28; transform:scale(0.60) translateY(0); }
    }
    /* Override entry for when music is active at load */
    .planet-music.load-active {
      animation: entryActive 0.9s 0.2s cubic-bezier(0.22,1,0.36,1) both;
    }
    .planet-athletic.load-inactive {
      animation: entryInactive 0.9s 0.35s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes entryActive {
      from { opacity:0; transform:scale(0.88) translateY(30px); }
      to   { opacity:1; transform:scale(1)    translateY(0); }
    }
    @keyframes entryInactive {
      from { opacity:0; transform:scale(0.62) translateY(20px); }
      to   { opacity:0.28; transform:scale(0.60) translateY(0); }
    }

    /* ── Responsive: short landscape phones ── */
    @media(max-height:500px){
      .content-group { margin-bottom:0; }
      .orbit-viewport { height:clamp(200px,48svh,250px); }
      .planet { height:clamp(190px,44svh,240px); }
      .planet-name { font-size:1.8rem; margin-bottom:6px; }
      .planet-features { gap:2px; }
      .planet-feature { font-size:0.52rem; }
      .app-label { margin-bottom:8px; }
      .nav-row { margin-top:8px; }
      .dash-link { margin-top:6px; }
    }

    /* ── Very narrow — Galaxy Z Fold5 (344px) ── */
    @media(max-width:350px){
      .planet { width:clamp(180px,52vw,210px); padding: clamp(16px,4vw,20px); }
      .planet-name { font-size:1.9rem; }
      .planet-features { padding-right:36px; }
      .planet-feature { font-size:0.54rem; letter-spacing:1px; }
    }
  </style>
</head>
<body>

<div class="stage" id="stage">

  <!-- Star canvas -->
  <canvas id="canvas"></canvas>

  <!-- Orbital ring — very subtle -->
  <div class="orbit-ring"></div>

  <!-- Content group: label + orbit + nav unified -->
  <div class="content-group">

  <!-- App label -->
  <p class="app-label">Select your mode</p>

  <!-- Orbit viewport -->
  <div class="orbit-viewport" id="orbitViewport">
    <div class="planet-track" id="planetTrack">

      <!-- ATHLETIC PLANET -->
      <div class="planet planet-athletic is-active" id="planetA">
        <div class="planet-glow"></div>

        <!-- Ambient waveform -->
        <svg class="planet-bg" viewBox="0 0 240 200" preserveAspectRatio="xMidYMid meet">
          <path fill="none" stroke="white" stroke-width="1.4"
            stroke-linecap="round" stroke-linejoin="round"
            d="M0,100 L24,100 L34,46 L44,154 L54,100
               L82,100 L92,42 L102,158 L112,100
               L140,100 L150,48 L160,152 L170,100
               L198,100 L208,44 L218,156 L228,100 L240,100"/>
          <path fill="none" stroke="white" stroke-width="0.7"
            stroke-linecap="round" opacity="0.4"
            d="M0,100 L20,100 L28,66 L36,134 L44,100
               L66,100 L74,60 L82,140 L90,100
               L112,100 L120,64 L128,136 L136,100
               L158,100 L166,62 L174,138 L182,100
               L204,100 L212,60 L220,140 L228,100 L240,100"/>
        </svg>

        <span class="planet-tag">Athletic Mode</span>
        <h2 class="planet-name">Athletic</h2>
        <div class="planet-features">
          <span class="planet-feature">Cadence training</span>
          <span class="planet-feature">Interval sets &amp; rest timer</span>
          <span class="planet-feature">Cadence ramp</span>
        </div>
        <div class="planet-cta">→</div>
      </div>

      <!-- MUSIC PLANET -->
      <div class="planet planet-music is-inactive" id="planetM">
        <div class="planet-glow"></div>

        <!-- Ambient soundwave -->
        <svg class="planet-bg" viewBox="0 0 240 200" preserveAspectRatio="xMidYMid meet">
          <path fill="none" stroke="white" stroke-width="1.4" stroke-linecap="round"
            d="M0,100 Q20,54 40,100 Q60,146 80,100
               Q100,54 120,100 Q140,146 160,100
               Q180,54 200,100 Q220,146 240,100"/>
          <path fill="none" stroke="white" stroke-width="0.7"
            stroke-linecap="round" opacity="0.38"
            d="M0,100 Q16,70 32,100 Q48,130 64,100
               Q80,70 96,100 Q112,130 128,100
               Q144,70 160,100 Q176,130 192,100
               Q208,70 224,100"/>
          <line x1="0" y1="72"  x2="240" y2="72"  stroke="white" stroke-width="0.5" opacity="0.15"/>
          <line x1="0" y1="84"  x2="240" y2="84"  stroke="white" stroke-width="0.5" opacity="0.15"/>
          <line x1="0" y1="96"  x2="240" y2="96"  stroke="white" stroke-width="0.5" opacity="0.15"/>
          <line x1="0" y1="108" x2="240" y2="108" stroke="white" stroke-width="0.5" opacity="0.15"/>
          <line x1="0" y1="120" x2="240" y2="120" stroke="white" stroke-width="0.5" opacity="0.15"/>
        </svg>

        <span class="planet-tag">Music Mode</span>
        <h2 class="planet-name">Music</h2>
        <div class="planet-features">
          <span class="planet-feature">18 instruments</span>
          <span class="planet-feature">5 practice modes</span>
          <span class="planet-feature">Subdivisions &amp; accents</span>
        </div>
        <div class="planet-cta">→</div>
      </div>

    </div><!-- /planet-track -->
  </div><!-- /orbit-viewport -->

  <!-- Navigation row -->
  <div class="nav-row">
    <div class="nav-btn hidden" id="navLeft">‹</div>
    <div class="nav-dots">
      <div class="nav-dot active" id="dotA"></div>
      <div class="nav-dot"        id="dotM"></div>
    </div>
    <div class="nav-btn" id="navRight">›</div>
  </div>

  <!-- Dashboard link -->
  <a href="dashboard.html" class="dash-link">My Progress →</a>

  </div><!-- /content-group -->

</div><!-- /stage -->

<script>
// ═══════════════════════════════════════════════════════════
//  STAR FIELD
// ═══════════════════════════════════════════════════════════
(function(){
  const cv=document.getElementById("canvas");
  const ctx=cv.getContext("2d");
  let W,H,small=[],bright=[];

  function resize(){
    W=cv.width=window.innerWidth;
    H=cv.height=window.innerHeight;
    build();
  }

  function build(){
    const n=Math.floor((W*H)/5800);
    small=Array.from({length:n},()=>({
      x:Math.random()*W, y:Math.random()*H,
      r:Math.random()*0.7+0.15,
      a:Math.random()*0.45+0.08,
      da:(Math.random()*0.005+0.002)*(Math.random()<0.5?1:-1),
      dx:(Math.random()*0.07+0.02)*(Math.random()<0.5?1:-1),
    }));
    bright=Array.from({length:7},()=>({
      x:Math.random()*W, y:Math.random()*H,
      r:Math.random()*0.9+1.1,
      a:Math.random()*0.3+0.5,
      da:(Math.random()*0.007+0.003)*(Math.random()<0.5?1:-1),
      dx:(Math.random()*0.04+0.01)*(Math.random()<0.5?1:-1),
      glow:0,
    }));
    bright.forEach(s=>s.glow=s.r*5.5);
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    for(const s of small){
      s.a+=s.da; if(s.a>0.53||s.a<0.06)s.da*=-1;
      s.x+=s.dx; if(s.x<0)s.x=W; if(s.x>W)s.x=0;
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${s.a.toFixed(3)})`; ctx.fill();
    }
    for(const s of bright){
      s.a+=s.da; if(s.a>0.85||s.a<0.42)s.da*=-1;
      s.x+=s.dx; if(s.x<0)s.x=W; if(s.x>W)s.x=0;
      const g=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.glow);
      g.addColorStop(0,`rgba(220,232,255,${(s.a*0.25).toFixed(3)})`);
      g.addColorStop(1,`rgba(220,232,255,0)`);
      ctx.beginPath(); ctx.arc(s.x,s.y,s.glow,0,Math.PI*2);
      ctx.fillStyle=g; ctx.fill();
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(240,246,255,${s.a.toFixed(3)})`; ctx.fill();
    }
    requestAnimationFrame(draw);
  }

  window.addEventListener("resize",resize);
  resize(); draw();
})();

// ═══════════════════════════════════════════════════════════
//  ORBITAL SELECTOR
// ═══════════════════════════════════════════════════════════
(function(){
  const track    = document.getElementById("planetTrack");
  const pA       = document.getElementById("planetA");
  const pM       = document.getElementById("planetM");
  const navLeft  = document.getElementById("navLeft");
  const navRight = document.getElementById("navRight");
  const dotA     = document.getElementById("dotA");
  const dotM     = document.getElementById("dotM");

  let active         = "athletic";
  let transitioning  = false;
  let autoTimer      = null;
  let userInteracted = false;
  let planetW        = 0;  // real rendered width, set by ResizeObserver
  const GAP          = 24; // px — matches CSS gap:24px

  // ── Calculate transform for centring ─────────────────────
  // Track is at left:50vw = true viewport centre.
  // translateX(-(pw/2)) → active planet centre = 50vw ✅
  // translateX(-(pw+GAP+pw/2)) → music planet centre = 50vw ✅
  function applyLayout(animate){
    if(!animate){
      track.style.transition = "none";
    } else {
      track.style.transition = "transform 0.55s cubic-bezier(0.4,0,0.2,1)";
    }

    const xOffset = planetW === 0
      ? "-50%"                                           // fallback before measurement
      : (active === "athletic"
          ? `${-(planetW/2)}px`
          : `${-(planetW + GAP + planetW/2)}px`);

    track.style.transform = `translateX(${xOffset}) translateY(-50%)`;

    if(active === "athletic"){
      pA.classList.add("is-active");    pA.classList.remove("is-inactive");
      pM.classList.add("is-inactive");  pM.classList.remove("is-active");
      navLeft.classList.add("hidden");  navRight.classList.remove("hidden");
      dotA.classList.add("active");     dotM.classList.remove("active");
    } else {
      pM.classList.add("is-active");    pM.classList.remove("is-inactive");
      pA.classList.add("is-inactive");  pA.classList.remove("is-active");
      navRight.classList.add("hidden"); navLeft.classList.remove("hidden");
      dotM.classList.add("active");     dotA.classList.remove("active");
    }

    // Re-enable transition after instant repositioning
    if(!animate){
      requestAnimationFrame(()=>{
        track.style.transition = "transform 0.55s cubic-bezier(0.4,0,0.2,1)";
      });
    }
  }

  function switchTo(mode){
    if(transitioning || mode === active) return;
    transitioning = true;
    active = mode;
    // Remeasure using offsetWidth (transform-independent) before layout
    const freshW = pA.offsetWidth;
    if(freshW > 0) planetW = freshW;
    applyLayout(true);
    setTimeout(()=>{ transitioning = false; }, 580);
  }

  function onInteract(){
    userInteracted = true;
    clearTimeout(autoTimer); // cancel auto-rotate once user interacts
  }

  // ── Arrow navigation ──
  navRight.addEventListener("click", ()=>{ onInteract(); switchTo("music"); });
  navLeft.addEventListener("click",  ()=>{ onInteract(); switchTo("athletic"); });

  // ── Tap inactive planet to switch ──
  pA.addEventListener("click", e=>{
    if(active === "athletic"){
      // Navigate to athletic
      onInteract();
      document.getElementById("stage").classList.add("out");
      setTimeout(()=>{ location.href="athleticMetronome.html"; }, 380);
    } else {
      e.preventDefault(); onInteract(); switchTo("athletic");
    }
  });

  pM.addEventListener("click", e=>{
    if(active === "music"){
      // Navigate to music
      onInteract();
      document.getElementById("stage").classList.add("out");
      setTimeout(()=>{ location.href="musicMetronome.html"; }, 380);
    } else {
      e.preventDefault(); onInteract(); switchTo("music");
    }
  });

  // ── Swipe gesture ──
  let touchStartX = 0;
  let touchStartY = 0;

  document.getElementById("orbitViewport").addEventListener("touchstart", e=>{
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, {passive:true});

  document.getElementById("orbitViewport").addEventListener("touchend", e=>{
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    // Only treat as horizontal swipe if horizontal movement dominates
    if(Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 38){
      onInteract();
      if(dx < 0) switchTo("music");
      else        switchTo("athletic");
    }
  }, {passive:true});

  // ── Auto-rotate — fires once after 8s if no interaction ──
  autoTimer = setTimeout(()=>{
    if(!userInteracted && active === "athletic"){
      switchTo("music");
      // Switch back after another 6s to show both options, then stop
      setTimeout(()=>{
        if(!userInteracted) switchTo("athletic");
      }, 6000);
    }
  }, 8000);

  // ── Use ResizeObserver for reliable measurement ──────────
  // ResizeObserver.contentRect gives LAYOUT width — unaffected by
  // CSS transforms like scale(). This is the correct measurement.
  const ro = new ResizeObserver(entries => {
    const w = entries[0].contentRect.width;
    if(w > 0 && w !== planetW){
      planetW = w;
      applyLayout(false);
    }
  });
  ro.observe(pA);

  // ── Recalculate on resize / rotation ─────────────────────
  // IMPORTANT: use offsetWidth, NOT getBoundingClientRect().
  // getBoundingClientRect() returns the SCALED width when a
  // CSS transform:scale() is active — giving wrong measurements.
  // offsetWidth always returns the layout width, unaffected by transforms.
  window.addEventListener("resize", ()=>{
    const w = pA.offsetWidth;
    if(w > 0){ planetW = w; }
    applyLayout(false);
  });

  // ── Fallback: force initial layout after 120ms ────────────
  setTimeout(()=>{
    if(planetW === 0){
      planetW = pA.offsetWidth || 220;
      applyLayout(false);
    }
  }, 120);

})();
</script>
</body>
</html>
